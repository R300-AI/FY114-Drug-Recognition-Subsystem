# Drawer Monitor 配置範例
# 路徑：config/drawer_config.yaml
# 說明：v2.0 架構 — intensity (0-255) + SMA(N) + min_state_duration

camera:
  frame_rate: QUARTER        # 幀率 (FULL/HALF/QUARTER/EIGHTH/SIXTEENTH)
  led_current: ULTRA_HIGH    # LED 電流 (LOW/MEDIUM/HIGH/ULTRA_HIGH)
  exposure_setting: DEFAULT  # 曝光設定 (DEFAULT/UNKNOWN)
  vid: 0x04F3               # USB Vendor ID
  pid: 0x0C7E               # USB Product ID

roi:
  enabled: true              # 啟用 ROI（建議：只監測關鍵區域）
  x1: 40                     # 左上角 X 座標 (0-159)
  y1: 40                     # 左上角 Y 座標 (0-159)
  x2: 120                    # 右下角 X 座標 (0-159, > x1)
  y2: 120                    # 右下角 Y 座標 (0-159, > y1)

thresholds:
  open: 80                   # 開啟閾值 (intensity ≤ 此值 → 完全開啟)
  closed: 150                # 閉合閾值 (intensity > 此值 → 完全閉合)
                             # 必須滿足：closed > open，建議間距 ≥ 20
                             # 中間為「閉合中」過渡區

# ===== 分析參數 =====
analysis:
  min_state_duration: 5      # 狀態持續幀數 (3-15)
                             # 新狀態需連續持續此幀數才確認變更（防抖）
                             # 預設 5（8 FPS 下約 0.6 秒）
  history_size: 500          # 時間序列歷史保存幀數

# ===== 顯示參數 =====
display:
  smoothing_window: 10       # SMA 視窗大小 N (1-30)
                             # SMA(N) 同時作用於圖表顯示與狀態判斷
                             # N=5  → 快速響應（0.6s，低噪聲環境）
                             # N=10 → 平衡預設（1.2s，一般環境）
                             # N=15 → 高穩定（1.9s，高噪聲環境）
  show_raw_data: false       # 同時顯示原始未平滑曲線（灰色）
  enable_smoothing: true     # 啟用 SMA 平滑（false 則使用原始 intensity）

# ===== 架構說明 =====
#
# 訊號流程：
#   原始 intensity_mean (0-255)
#       ↓
#   [SMA(N)] 取最近 N 幀算術平均
#       ↓
#   平滑後的 intensity 值
#       ↓
#   [閾值比較]
#     intensity > threshold_closed → 完全閉合
#     threshold_open < intensity ≤ threshold_closed → 閉合中
#     intensity ≤ threshold_open → 完全開啟
#       ↓
#   [防抖] 需連續 min_state_duration 幀才確認狀態變更
#
# 響應延遲 ≈ N / FPS（例：N=10, FPS=8 → 約 1.25 秒）
#
# ===== 調校建議 =====
#
# 方案 A：快速響應（信號乾淨）
#   smoothing_window: 5
#   min_state_duration: 4
#   響應時間：約 0.6 秒
#
# 方案 B：平衡（預設，推薦）
#   smoothing_window: 10
#   min_state_duration: 5
#   響應時間：約 1.2 秒
#
# 方案 C：高穩定（噪聲大）
#   smoothing_window: 15
#   min_state_duration: 8
#   響應時間：約 1.9 秒
#
# 詳細調校指南：docs/FILTER_TUNING_GUIDE.md
