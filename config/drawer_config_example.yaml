# Drawer Monitor 配置範例
# 路徑：config/drawer_config.yaml
# 說明：物理层/显示层分离架构配置

camera:
  frame_rate: QUARTER        # 幀率 (FULL/HALF/QUARTER/EIGHTH/SIXTEENTH)
  led_current: ULTRA_HIGH    # LED 電流 (LOW/MEDIUM/HIGH/ULTRA_HIGH)
  exposure_setting: DEFAULT  # 曝光設定 (DEFAULT/UNKNOWN)
  vid: 0x04F3               # USB Vendor ID
  pid: 0x0C7E               # USB Product ID

roi:
  enabled: true              # 啟用 ROI（建議：只監測關鍵區域）
  x1: 40                     # 左上角 X 座標
  y1: 40                     # 左上角 Y 座標
  x2: 120                    # 右下角 X 座標
  y2: 120                    # 右下角 Y 座標

thresholds:
  open: 0.08                 # 開啟閾值（depth_metric > 0.08 為完全開啟）
  closed: 0.06               # 閉合閾值（depth_metric < 0.06 為完全閉合）

# ===== 分析参数（物理层）=====
analysis:
  use_depth_transform: true           # 使用物理模型深度轉換（1/√intensity）
                                      # 推薦啟用：反映真實距離關係
  
  min_state_duration: 5               # 狀態持續幀數 (3-15)
                                      # 新狀態需持續此幀數才確認變更
                                      # 推薦：5（約 0.6 秒，防止瞬間抖动）
                                      # 物理层：只做基本状态确认，不做复杂滤波
  
  history_size: 500                   # 時間序列歷史保存幀數

# ===== 显示参数（显示层平滑）=====
display:
  smoothing_window: 10                # 移动平均窗口大小 (1-30)
                                      # 值越大图表越平滑，但响应越慢
                                      # 推薦：10-15（約 1-2 秒平滑，有效抑制噪声）
                                      # 针对0.5秒周期噪声：推荐15
  
  show_raw_data: false                # 同时显示原始数据曲线
                                      # true: 显示原始+平滑两条曲线
                                      # false: 只显示平滑曲线

# ===== 架构说明 =====
#
# 物理层（DrawerStateDetector）：
#   - 基于原始物理数据直接判断
#   - 只使用阈值比较 + 基本状态持续确认
#   - 不做复杂的滤波处理
#   - 保证数据的物理意义
#
# 显示层（Time Series Chart）：
#   - 在时间序列图表上应用移动平均平滑
#   - 提升视觉效果，降低噪声干扰
#   - 不影响物理层的状态判断
#   - 可选显示原始数据作为对比
#
# ===== 调优建议 =====
#
# 低噪声环境（标准距离）：
#   min_state_duration: 3-5
#   smoothing_window: 5-10
#   响应时间：0.4-1.0 秒
#
# 高噪声环境（近距离或0.5秒周期噪声）：
#   min_state_duration: 8-10
#   smoothing_window: 15-20
#   响应时间：1.0-2.0 秒
#
# 方案 C：超穩定（極端噪聲）
#   filter_window: 15, min_state_duration: 10, ema_alpha: 0.2
#   state_lock_frames: 20, use_median_filter: true
#   響應時間：1.8-2.0 秒，穩定性：極高，誤報率：幾乎為零
#
# 詳細調校指南：docs/FILTER_TUNING_GUIDE.md
