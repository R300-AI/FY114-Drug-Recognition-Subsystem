# Drawer Monitor 推薦配置範例
# 路徑：config/drawer_config.yaml
# 說明：此配置針對近距離高噪聲環境優化

camera:
  frame_rate: QUARTER        # 幀率 (FULL/HALF/QUARTER/EIGHTH/SIXTEENTH)
  led_current: ULTRA_HIGH    # LED 電流 (LOW/MEDIUM/HIGH/ULTRA_HIGH)
  exposure_setting: DEFAULT  # 曝光設定 (DEFAULT/UNKNOWN)
  vid: 0x04F3               # USB Vendor ID
  pid: 0x0C7E               # USB Product ID

roi:
  enabled: true              # 啟用 ROI（建議：只監測關鍵區域）
  x1: 40                     # 左上角 X 座標
  y1: 40                     # 左上角 Y 座標
  x2: 120                    # 右下角 X 座標
  y2: 120                    # 右下角 Y 座標

thresholds:
  open: 0.08                 # 開啟閾值（depth_metric > 0.08 為完全開啟）
  closed: 0.06               # 閉合閾值（depth_metric < 0.06 為完全閉合）

# ===== 增強濾波參數（v2.1 新增，針對0.5秒周期噪聲優化）=====
analysis:
  use_depth_transform: true           # 使用物理模型深度轉換（推薦啟用）
  
  # 基礎濾波參數（針對高頻噪聲加強）
  filter_window: 15                   # 濾波窗口大小 (12-20)
                                      # 值越大越平滑，但響應越慢
                                      # 推薦：15（約 2 秒響應，可抑制0.5秒周期噪聲）
  
  min_state_duration: 10              # 狀態持續幀數 (8-12)
                                      # 新狀態需持續此幀數才確認變更
                                      # 推薦：10（約 1.2 秒確認，有效防止誤報）
  
  # 高級濾波參數（針對0.5秒周期噪聲強化）
  ema_alpha: 0.2                      # EMA 平滑係數 (0.15-0.3)
                                      # 值越小越平滑（0.2=20%新數據+80%歷史）
                                      # 推薦：0.2（強力平滑，抑制高頻波動）
  
  use_median_filter: true             # 啟用中值濾波（去除尖峰噪聲）
                                      # 推薦：始終啟用（關鍵！）
  
  state_lock_frames: 20               # 狀態鎖定幀數 (15-30)
                                      # 狀態變更後鎖定此幀數，防止快速回跳
                                      # 推薦：20（約 2.5 秒鎖定，防止0.5秒周期干擾）
  
  history_size: 500                   # 時間序列歷史保存幀數

# ===== 配置方案參考 =====
#
# 方案 A：近距離高噪聲（預設，推薦）
#   filter_window: 10, min_state_duration: 8, ema_alpha: 0.3
#   state_lock_frames: 15, use_median_filter: true
#   響應時間：1.0-1.2 秒，穩定性：高，誤報率：極低
#
# 方案 B：快速響應（中等噪聲）
#   filter_window: 7, min_state_duration: 5, ema_alpha: 0.4
#   state_lock_frames: 10, use_median_filter: true
#   響應時間：0.6-0.8 秒，穩定性：中等，誤報率：5-10%
#
# 方案 C：超穩定（極端噪聲）
#   filter_window: 15, min_state_duration: 10, ema_alpha: 0.2
#   state_lock_frames: 20, use_median_filter: true
#   響應時間：1.8-2.0 秒，穩定性：極高，誤報率：幾乎為零
#
# 詳細調校指南：docs/FILTER_TUNING_GUIDE.md
