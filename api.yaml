# AI Search Platform 連線設定
# 請向系統整合商（SI）確認實際 IP 後修改此檔。
# run.py 與 test.py 啟動時自動讀取。

segment_url: "http://localhost:8001"       # 影像切割服務（本機測試用，部署到 Pi 時改為 192.168.50.1）
